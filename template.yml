Resources:
  GetArticleLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${GetArticle}"
      RetentionInDays: 1

  GetArticle:
    Type: AWS::Serverless::Function
    DependsOn: GetArticleLogGroup
    Properties:
      CodeUri: .
      Handler: app.lambdaHandler
      Runtime: nodejs24.x
      Architectures:
        - x86_64
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/app.ts
  