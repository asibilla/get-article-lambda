Transform: AWS::Serverless-2016-10-31
Description: SAM app with Typescript and log retention

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
        - x86_64

Parameters:
  GetArticleFunctionName:
    Type: String
    Default: andysibillacom-get-article
  WriteArticleFunctionName:
    Type: String
    Default: andysibillacom-write-article
  AuthorizerFunctionName:
    Type: String
    Default: andysibillacom-authorizer
  CloudFrontSecretKeyPath:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /cloudfront/secret-key
  DomainName:
    Type: String
    Default: api.andysibilla.com
  AcmCertificateArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /andysibillacom/acm-certificate-arn
  ArticleTableName:
    Type: String
    Default: andysibillacom-content
  AllowedOrigins:
    Type: String
    Default: https://andysibilla.com,https://www.andysibilla.com,http://localhost:3000

Resources:
  ArticleApi: 
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Domain:
        DomainName: !Ref DomainName
        CertificateArn: !Ref AcmCertificateArn
        EndpointConfiguration: REGIONAL
      Auth:
        DefaultAuthorizer: CloudFrontSecretAuthorizer
        Authorizers:
          CloudFrontSecretAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionPayloadType: REQUEST
            Identity:
              Headers:
                - X-Origin-Secret
            AuthorizerPayloadFormatVersion: "1.0"
            ResultTtlInSeconds: 300

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref AuthorizerFunctionName
      CodeUri: .
      Handler: authorizer.lambdaHandler
      Environment:
        Variables:
          CLOUDFRONT_SECRET: !Ref CloudFrontSecretKeyPath
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/authorizer.ts

  GetArticle:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref GetArticleFunctionName
      CodeUri: .
      Handler: app.lambdaHandler
      Environment:
        Variables:
          ARTICLE_TABLE_NAME: !Ref ArticleTableName
          ALLOWED_ORIGINS: !Ref AllowedOrigins
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:DescribeTable
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ArticleTableName}
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ArticleTableName}/index/*
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /api/get-article
            Method: get
            RestApiId: !Ref ArticleApi
        OptionsEvent:
          Type: Api
          Properties:
            Path: /api/get-article
            Method: options
            RestApiId: !Ref ArticleApi
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
          - src/app.ts

  WriteArticle:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref WriteArticleFunctionName
      CodeUri: .
      Handler: write-app.lambdaHandler
      Environment:
        Variables:
          ARTICLE_TABLE_NAME: !Ref ArticleTableName
          ALLOWED_ORIGINS: !Ref AllowedOrigins
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:DescribeTable
              Resource:
                - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${ArticleTableName}
      Events:
        PutEvent:
          Type: Api
          Properties:
            Path: /api/write-article
            Method: put
            RestApiId: !Ref ArticleApi
            Auth:
              Authorizer: AWS_IAM
        PatchEvent:
          Type: Api
          Properties:
            Path: /api/write-article
            Method: patch
            RestApiId: !Ref ArticleApi
            Auth:
              Authorizer: AWS_IAM
        DeleteEvent:
          Type: Api
          Properties:
            Path: /api/write-article
            Method: delete
            RestApiId: !Ref ArticleApi
            Auth:
              Authorizer: AWS_IAM
        OptionsEvent:
          Type: Api
          Properties:
            Path: /api/write-article
            Method: options
            RestApiId: !Ref ArticleApi
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - src/write-app.ts

  ContentEditorApiPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Invoke IAM-protected article write endpoints
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: execute-api:Invoke
            Resource:
              - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ArticleApi}/Prod/PUT/api/write-article
              - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ArticleApi}/Prod/PATCH/api/write-article
              - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ArticleApi}/Prod/DELETE/api/write-article

Outputs:
  ApiUrl:
    Description: Invoke URL using the custom domain
    Value: !Sub "https://${DomainName}/Prod"
  ApiGatewayDomainName:
    Description: Regional execute-api hostname for this REST API (no custom domain)
    Value: !Sub "${ArticleApi}.execute-api.${AWS::Region}.amazonaws.com"
  WriteArticleUrl:
    Description: IAM-protected article write endpoint (custom domain)
    Value: !Sub "https://${DomainName}/Prod/api/write-article"
  ContentEditorApiPolicyArn:
    Description: Attach to IAM roles/users that should invoke the write API
    Value: !Ref ContentEditorApiPolicy
